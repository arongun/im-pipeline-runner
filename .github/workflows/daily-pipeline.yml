name: Daily Pipeline

on:
  schedule:
    - cron: '0 5 * * *' # 5 AM UTC daily
  workflow_dispatch:
    inputs:
      force:
        description: 'Skip idempotency check (run even if already ran today)'
        type: boolean
        default: true
      retry:
        description: 'Enable retry loop for min 3 GO prospects (auto-enabled for scheduled runs)'
        type: boolean
        default: false
      org_id:
        description: 'Run for a specific org ID only (leave empty for all active orgs)'
        type: string
        default: ''

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v5
        with:
          repository: gjarrosson/investormagic
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EDGAR_PROXY_URL: ${{ secrets.EDGAR_PROXY_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          QUIET_MODE: 'true'
          NODE_OPTIONS: '--dns-result-order=ipv4first'
          INPUT_EVENT_NAME: ${{ github.event_name }}
          INPUT_RETRY: ${{ inputs.retry }}
          INPUT_ORG_ID: ${{ inputs.org_id }}
        run: |
          args=(--force)
          if [[ "$INPUT_EVENT_NAME" == "schedule" ]] || [[ "$INPUT_RETRY" == "true" ]]; then
            echo "Retry loop enabled"
          else
            args+=(--no-retry)
            echo "Single run mode (no retry)"
          fi
          if [[ -n "$INPUT_ORG_ID" ]]; then
            args+=(--org "$INPUT_ORG_ID")
          fi
          npx tsx -r tsconfig-paths/register scripts/run-pipeline.ts "${args[@]}"
